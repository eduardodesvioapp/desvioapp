services:
  web:
    image: desvio-web:latest
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.desvio-web.rule=Host(`desvio.app.br`)"
      - "traefik.http.routers.desvio-web.entrypoints=websecure"
      - "traefik.http.routers.desvio-web.tls.certresolver=letsencryptresolver"
      - "traefik.http.services.desvio-web.loadbalancer.server.port=80"
    networks:
      - desvio-net-01
    restart: unless-stopped

  ai-worker:
    image: desvio-ai-worker:latest
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-}
      - VITE_SUPABASE_SERVICE_ROLE_KEY=${VITE_SUPABASE_SERVICE_ROLE_KEY:-}
      - VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY:-}
      - VITE_GEMINI_API_KEY_2=${VITE_GEMINI_API_KEY_2:-}
      - VITE_GEMINI_API_KEY_3=${VITE_GEMINI_API_KEY_3:-}
      - VITE_GEMINI_API_KEY_4=${VITE_GEMINI_API_KEY_4:-}
    restart: always

  admin-mailer:
    image: desvio-admin-mailer:latest
    environment:
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_SENDER_NAME=${SMTP_SENDER_NAME:-Desvio}
      - SMTP_FROM=${SMTP_FROM:-}
      - POLL_INTERVAL_MS=${POLL_INTERVAL_MS:-5000}
      - MAX_ATTEMPTS=${MAX_ATTEMPTS:-5}
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:

networks:
  desvio-net-01:
    external: true
